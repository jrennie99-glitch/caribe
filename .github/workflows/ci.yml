name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check
        run: |
          for f in server/*.js js/*.js; do node --check "$f"; done
          echo "syntax OK"

      - name: Unit + ledger tests
        run: npm test

      - name: Boot + smoke test (health, ledger conservation)
        run: |
          node --no-warnings server/server.js &
          SRV=$!
          sleep 3
          curl -fsS http://localhost:8080/healthz | tee /dev/stderr | grep -q '"ok":true'
          H=$(curl -fsS http://localhost:8080/api/health)
          echo "$H"
          node -e "const j=$H; if(!j.ledgerSound||!j.moneyConserved){console.error('ledger NOT sound');process.exit(1)} console.log('ledger sound + money conserved')"
          curl -fsS -X POST http://localhost:8080/api/demo | grep -q '"token"'
          echo "demo endpoint OK"
          kill $SRV
